shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
  - chokidar@4.0.3

packages:
  - apps/*
  - '!apps/uniapp'
  - packages/*
  - playgrounds/*

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

patchedDependencies:
  '@primevue/core': patches/@primevue__core.patch
  '@primevue/nuxt-module': patches/@primevue__nuxt-module.patch
  nprogress: patches/nprogress.patch
  primevue: patches/primevue.patch

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogs:
  build:
    jiti: ^2.6.1
    postcss-preset-env: ^11.2.0
    vite-plus: latest
  deps:
    '@ctrl/tinycolor': ^4.2.0
    axios: ^1.11.0
    consola: ^3.4.2
    date-fns: ^4.1.0
    defu: ^6.1.6
    es-toolkit: ^1.45.1
    lossless-json: ^4.3.0
    pausable-timers: ^0.2.0
    worker-timers: ^8.0.31
    zod: ^4.3.6
  devtools:
    '@nuxt/devtools': ^4.0.0-alpha.3
    '@tanstack/vue-query-devtools': ^6.1.13
  docs:
    vitepress: ^2.0.0-alpha.17
  eco-nuxt:
    '@hebilicious/vue-query-nuxt': ^0.3.0
    '@nuxt/fonts': ^0.14.0
    '@nuxtjs/color-mode': ^4.0.0
    '@nuxtjs/seo': ^5.1.0
    '@pinia/nuxt': ^0.11.3
    '@primevue/nuxt-module': 4.3.5
    '@unocss/nuxt': ^66.6.7
    '@vee-validate/nuxt': ^4.15.1
    '@vite-pwa/nuxt': ^1.1.1
    '@vueuse/nuxt': ^14.2.1
    nuxt: ^4.4.2
    nuxt-html-inject-commands: ^0.1.3
  eco-vue:
    '@primeuix/themes': ^2.0.3
    '@tanstack/vue-query': ^5.96.2
    '@vee-validate/zod': ^4.15.1
    '@vueuse/core': ^14.2.1
    '@vueuse/motion': ^3.0.3
    json-editor-vue: ^0.18.1
    pinia: ^3.0.4
    primevue: 4.3.5
    vee-validate: ^4.15.1
    vue-filepond: ^7.0.4
  frontend:
    chart.js: ^4.5.1
    filepond: ^4.32.12
    filepond-plugin-file-rename: ^1.1.8
    filepond-plugin-file-validate-type: ^1.2.9
    filepond-plugin-image-preview: ^4.6.12
    nprogress: ^0.2.0
    unocss: ^66.6.7
    vanilla-jsoneditor: ^3.12.0
  icons:
    '@iconify-json/prime': ^1.2.4
    '@nuxt/icon': ^2.2.1
  lint:
    '@antfu/eslint-config': ^8.0.0
    '@nuxt/eslint': ^1.15.2
    eslint: ^10.2.0
  test:
    '@vitest/coverage-v8': ^4.1.2
  types:
    '@nuxt/schema': ^4.4.2
    '@types/node': ^25.5.2
    '@types/nprogress': ^0.2.3
    type-fest: ^5.5.0
    typescript: ^6.0.2
    vue-component-type-helpers: ^3.2.6
    vue-tsc: ^3.2.6

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
